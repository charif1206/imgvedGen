name: Telegram Gemini Ping

on:
  schedule:
        # Run every 30 minutes to reduce Gemini quota/rate-limit pressure.
        - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  send-telegram-message:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      LEGACY_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      LEGACY_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

    steps:
      - name: Log start time
        run: echo "[START] Workflow started at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve and validate secrets
        shell: bash
        run: |
          set -euo pipefail

          RESOLVED_BOT_TOKEN="${BOT_TOKEN:-${LEGACY_BOT_TOKEN:-}}"
          RESOLVED_CHAT_ID="${CHAT_ID:-${LEGACY_CHAT_ID:-}}"
          RESOLVED_GEMINI_API_KEY="${GEMINI_API_KEY:-}"
          RESOLVED_GEMINI_MODEL="${GEMINI_MODEL:-gemini-2.5-flash}"

          if [ -z "${RESOLVED_BOT_TOKEN}" ]; then
            echo "::error::Missing BOT_TOKEN secret. You can also provide TELEGRAM_BOT_TOKEN as fallback."
            exit 1
          fi

          if [ -z "${RESOLVED_CHAT_ID}" ]; then
            echo "::error::Missing CHAT_ID secret. You can also provide TELEGRAM_CHAT_ID as fallback."
            exit 1
          fi

          if [ -z "${RESOLVED_GEMINI_API_KEY}" ]; then
            echo "::error::Missing GEMINI_API_KEY secret."
            exit 1
          fi

          echo "::add-mask::${RESOLVED_BOT_TOKEN}"
          echo "::add-mask::${RESOLVED_CHAT_ID}"
          echo "::add-mask::${RESOLVED_GEMINI_API_KEY}"
          echo "RESOLVED_BOT_TOKEN=${RESOLVED_BOT_TOKEN}" >> "${GITHUB_ENV}"
          echo "RESOLVED_CHAT_ID=${RESOLVED_CHAT_ID}" >> "${GITHUB_ENV}"
          echo "RESOLVED_GEMINI_API_KEY=${RESOLVED_GEMINI_API_KEY}" >> "${GITHUB_ENV}"
          echo "RESOLVED_GEMINI_MODEL=${RESOLVED_GEMINI_MODEL}" >> "${GITHUB_ENV}"
          echo "Secrets resolved successfully."

      - name: Generate Gemini message and send Telegram
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
          print(f"Preparing Gemini + Telegram message at {now}")

          token = os.getenv("RESOLVED_BOT_TOKEN")
          chat_id = os.getenv("RESOLVED_CHAT_ID")
          gemini_api_key = os.getenv("RESOLVED_GEMINI_API_KEY")
          gemini_model = os.getenv("RESOLVED_GEMINI_MODEL", "gemini-2.5-flash")

          missing = [
              name
              for name, value in (
                  ("RESOLVED_BOT_TOKEN", token),
                  ("RESOLVED_CHAT_ID", chat_id),
                  ("RESOLVED_GEMINI_API_KEY", gemini_api_key),
              )
              if not value
          ]
          if missing:
              print(f"::error::Missing required secret(s): {', '.join(missing)}")
              sys.exit(1)

          gemini_url = (
              "https://generativelanguage.googleapis.com/v1beta/models/"
              f"{urllib.parse.quote(gemini_model, safe='')}:generateContent"
          )

          gemini_payload = {
              "contents": [
                  {
                      "parts": [
                          {
                              "text": (
                                  "Generate one concise Telegram update for an AI tutor bot about image/video prompting. "
                                  "Keep it under 40 words. Make it practical and varied, not repetitive. "
                                  f"Reference current UTC time exactly once: {now}. "
                                  "Output plain text only."
                              )
                          }
                      ]
                  }
              ],
              "generationConfig": {
                  "temperature": 1.0,
                  "topP": 0.95,
              },
          }

          text = ""
          last_error = None
          for attempt in range(1, 4):
              gemini_request = urllib.request.Request(
                  gemini_url,
                  data=json.dumps(gemini_payload).encode("utf-8"),
                  method="POST",
                  headers={
                      "Content-Type": "application/json",
                      "x-goog-api-key": gemini_api_key,
                  },
              )

              try:
                  with urllib.request.urlopen(gemini_request, timeout=30) as response:
                      gemini_body = response.read().decode("utf-8", errors="replace")
                      gemini_status = response.getcode()

                  if gemini_status < 200 or gemini_status >= 300:
                      last_error = f"Gemini API call failed with HTTP status {gemini_status}"
                      print(f"::error::{last_error}")
                      print(f"::error::Gemini response body: {gemini_body}")
                  else:
                      gemini_data = json.loads(gemini_body)
                      candidates = gemini_data.get("candidates", [])
                      if not candidates:
                          last_error = "Gemini returned no candidates"
                          print("::error::Gemini returned no candidates")
                          print(f"::error::Gemini response body: {gemini_body}")
                      else:
                          parts = candidates[0].get("content", {}).get("parts", [])
                          text_parts = [part.get("text", "") for part in parts if part.get("text")]
                          text = "\n".join(text_parts).strip()
                          if text:
                              break
                          last_error = "Gemini returned empty text"
                          print("::error::Gemini returned empty text")
                          print(f"::error::Gemini response body: {gemini_body}")
              except urllib.error.HTTPError as error:
                  error_body = error.read().decode("utf-8", errors="replace")
                  last_error = f"Gemini HTTPError {error.code}: {error.reason}"
                  print(f"::error::{last_error}")
                  print(f"::error::Gemini error body: {error_body}")
                  if error.code == 403:
                      print("::error::Hint: check GEMINI_API_KEY permissions and model access.")
                  if error.code == 404:
                      print("::error::Hint: GEMINI_MODEL is invalid or unavailable for this key.")
                  if error.code == 429:
                      print("::warning::Gemini rate limit hit. Retrying with backoff.")
              except urllib.error.URLError as error:
                  last_error = f"Network error while calling Gemini: {error.reason}"
                  print(f"::error::{last_error}")

              if attempt < 3:
                  sleep_seconds = attempt * 8
                  print(f"Retrying Gemini request in {sleep_seconds}s (attempt {attempt + 1}/3)")
                  time.sleep(sleep_seconds)

          if not text:
              print(f"::error::Failed to generate Gemini message after retries: {last_error}")
              sys.exit(1)

          print(f"Gemini message generated: {text}")

          url = f"https://api.telegram.org/bot{token}/sendMessage"
          payload = urllib.parse.urlencode({"chat_id": chat_id, "text": text}).encode("utf-8")

          request = urllib.request.Request(url, data=payload, method="POST")
          request.add_header("Content-Type", "application/x-www-form-urlencoded")

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  status = response.getcode()

              print(f"Telegram HTTP status: {status}")
              print(f"Telegram response body: {body}")

              if status < 200 or status >= 300:
                  print(f"::error::Telegram API call failed with HTTP status {status}")
                  sys.exit(1)

              data = json.loads(body)
              if not data.get("ok", False):
                  description = data.get("description", "No description provided")
                  print(f"::error::Telegram API error: {description}")
                  lowered = description.lower()
                  if "chat not found" in lowered:
                      print("::error::Hint: verify CHAT_ID and make sure the chat started the bot (/start).")
                  if "bots can't send messages to bots" in lowered:
                      print("::error::Hint: CHAT_ID points to a bot account. Use a user, group, or channel chat id instead.")
                      print("::error::Hint: open Telegram with your bot from a human account, send /start, then use that chat id.")
                  if "unauthorized" in lowered:
                      print("::error::Hint: BOT_TOKEN is invalid or revoked. Regenerate via BotFather.")
                  sys.exit(1)

              print(f"[SUCCESS] Telegram message sent at {now}")

          except urllib.error.HTTPError as error:
              error_body = error.read().decode("utf-8", errors="replace")
              print(f"::error::Telegram HTTPError {error.code}: {error.reason}")
              print(f"::error::Telegram error body: {error_body}")

              lowered = ""
              try:
                  error_data = json.loads(error_body)
                  lowered = str(error_data.get("description", "")).lower()
              except Exception:
                  lowered = error_body.lower()

              if "bots can't send messages to bots" in lowered:
                  print("::error::Hint: CHAT_ID points to a bot account. Use a user, group, or channel chat id instead.")
                  print("::error::Hint: open Telegram with your bot from a human account, send /start, then use that chat id.")
              if "chat not found" in lowered:
                  print("::error::Hint: verify CHAT_ID and make sure the chat started the bot (/start).")
              if "unauthorized" in lowered:
                  print("::error::Hint: BOT_TOKEN is invalid or revoked. Regenerate via BotFather.")

              sys.exit(1)
          except urllib.error.URLError as error:
              print(f"::error::Network error while sending Telegram message: {error.reason}")
              sys.exit(1)
          except Exception as error:
              print(f"::error::Unexpected error while sending Telegram message: {error}")
              sys.exit(1)
          PY

      - name: Log final status
        if: always()
        run: |
          NOW="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ "${{ job.status }}" = "success" ]; then
            echo "[DONE] Success at ${NOW}"
          else
            echo "[DONE] Failure at ${NOW}"
          fi