name: Telegram Ping

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  send-telegram-message:
    runs-on: ubuntu-latest
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      LEGACY_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      LEGACY_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Log start time
        run: echo "[START] Workflow started at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve and validate secrets
        shell: bash
        run: |
          set -euo pipefail

          RESOLVED_BOT_TOKEN="${BOT_TOKEN:-${LEGACY_BOT_TOKEN:-}}"
          RESOLVED_CHAT_ID="${CHAT_ID:-${LEGACY_CHAT_ID:-}}"

          if [ -z "${RESOLVED_BOT_TOKEN}" ]; then
            echo "::error::Missing BOT_TOKEN secret. You can also provide TELEGRAM_BOT_TOKEN as fallback."
            exit 1
          fi

          if [ -z "${RESOLVED_CHAT_ID}" ]; then
            echo "::error::Missing CHAT_ID secret. You can also provide TELEGRAM_CHAT_ID as fallback."
            exit 1
          fi

          echo "::add-mask::${RESOLVED_BOT_TOKEN}"
          echo "::add-mask::${RESOLVED_CHAT_ID}"
          echo "RESOLVED_BOT_TOKEN=${RESOLVED_BOT_TOKEN}" >> "${GITHUB_ENV}"
          echo "RESOLVED_CHAT_ID=${RESOLVED_CHAT_ID}" >> "${GITHUB_ENV}"
          echo "Secrets resolved successfully."

      - name: Send Telegram message
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M:%S UTC")
          print(f"Preparing Telegram message at {now}")

          token = os.getenv("RESOLVED_BOT_TOKEN")
          chat_id = os.getenv("RESOLVED_CHAT_ID")

          missing = [
              name
              for name, value in (("RESOLVED_BOT_TOKEN", token), ("RESOLVED_CHAT_ID", chat_id))
              if not value
          ]
          if missing:
              print(f"::error::Missing required secret(s): {', '.join(missing)}")
              sys.exit(1)

          text = f"GitHub Actions heartbeat at {now}"
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          payload = urllib.parse.urlencode({"chat_id": chat_id, "text": text}).encode("utf-8")

          request = urllib.request.Request(url, data=payload, method="POST")
          request.add_header("Content-Type", "application/x-www-form-urlencoded")

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  status = response.getcode()

              print(f"Telegram HTTP status: {status}")
              print(f"Telegram response body: {body}")

              if status < 200 or status >= 300:
                  print(f"::error::Telegram API call failed with HTTP status {status}")
                  sys.exit(1)

              data = json.loads(body)
              if not data.get("ok", False):
                  description = data.get("description", "No description provided")
                  print(f"::error::Telegram API error: {description}")
                  lowered = description.lower()
                  if "chat not found" in lowered:
                      print("::error::Hint: verify CHAT_ID and make sure the chat started the bot (/start).")
                  if "unauthorized" in lowered:
                      print("::error::Hint: BOT_TOKEN is invalid or revoked. Regenerate via BotFather.")
                  sys.exit(1)

              print(f"[SUCCESS] Telegram message sent at {now}")

          except urllib.error.HTTPError as error:
              error_body = error.read().decode("utf-8", errors="replace")
              print(f"::error::Telegram HTTPError {error.code}: {error.reason}")
              print(f"::error::Telegram error body: {error_body}")
              sys.exit(1)
          except urllib.error.URLError as error:
              print(f"::error::Network error while sending Telegram message: {error.reason}")
              sys.exit(1)
          except Exception as error:
              print(f"::error::Unexpected error while sending Telegram message: {error}")
              sys.exit(1)
          PY

      - name: Log final status
        if: always()
        run: |
          NOW="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ "${{ job.status }}" = "success" ]; then
            echo "[DONE] Success at ${NOW}"
          else
            echo "[DONE] Failure at ${NOW}"
          fi